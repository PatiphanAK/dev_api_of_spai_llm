services:
  app:
    build: .
    container_name: python_app
    environment:
      - MODEL_DIR=/models
      - BUILD_VERSION=xxxxxxx
    volumes:
      - ./main.py:/app/main.py
      - ./models:/models
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
